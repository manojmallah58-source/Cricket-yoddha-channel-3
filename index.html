<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Sonu // Live Stream</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/controls.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; height: 100%; background: #000; overflow: hidden; 
            font-family: sans-serif;
        }
        .shaka-video-container { 
            position: fixed; inset: 0; background: #000; 
            display: flex; align-items: center; justify-content: center; 
        }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="shaka-video-container" id="pc">
        <video id="v" autoplay playsinline></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.ui.min.js"></script>
    <script>
        const STREAM_URL = 'https://otte.live.fly.ww.aiv-cdn.net/iad-nitro/live/clients/dash/enc/tcgcz1g3fk/out/v1/33a4bce588914c258fd9300022b50846/cenc.mpd';
        // Key format: KeyID (hex) : Key (hex)
        const CLEAR_KEY = '632b06f50e561ccfc3473ae057177d70:1fd0877cfa85e2617ab00f14b4fb66fe';

        document.addEventListener('DOMContentLoaded', async () => {
            const video = document.getElementById('v');
            const container = document.getElementById('pc');
            
            const player = new shaka.Player(video);

            // Configure DRM
            player.configure({
                drm: {
                    clearKeys: {
                        [CLEAR_KEY.split(':')[0]]: CLEAR_KEY.split(':')[1]
                    }
                }
            });

            // Set Headers
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.cricbuzz.com/';
            });

            const ui = new shaka.ui.Overlay(player, container, video);
            
            try {
                await player.load(STREAM_URL);
            } catch (e) {
                console.error("Error loading stream", e);
            }
        });
    </script>
</body>
</html>
