<html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>CRICKET_YODDHA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.min.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.min.css" crossorigin="anonymous">
<style>
    body {
        background-color: #000;
        margin: 0;
    }

    .video-container {
        position: relative;
        width: 100%;
        height: 100%;
        background-color: black;
    }

    .logo {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1;
        max-width: 120px;
        max-height: 120px;
        pointer-events: none;
    }

    .shaka-spinner-container {
        display: none;
    }

    .uc {
        pointer-events: none;
    }
</style>
</head>

<body>
    <div class="video-container">
        <img src="" alt="Logo" class="logo">

        <div data-shaka-player-container style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
            <video autoplay muted data-shaka-player id="video" poster="https://i.postimg.cc/zX5R78S1/In-Shot-20250930-163713042.jpg" style="width:100%; height:100%;"></video>
        </div>
    </div>

    <script>
    if (window.top !== window.self) {
        window.addEventListener('DOMContentLoaded', function() {
            document.body.innerHTML = '';
            const messageDiv = document.createElement('div');
            messageDiv.id = 'message';
            messageDiv.textContent = 'Ab to copy mat kar chutiye By @CRICKET_YODDHA';
            messageDiv.style.color = '#fff';
            messageDiv.style.backgroundColor = '#000';
            messageDiv.style.position = 'fixed';
            messageDiv.style.top = '50%';
            messageDiv.style.left = '50%';
            messageDiv.style.transform = 'translate(-50%, -50%)';
            messageDiv.style.padding = '20px';
            messageDiv.style.borderRadius = '10px';
            messageDiv.style.textAlign = 'center';
            messageDiv.style.fontFamily = 'Arial, sans-serif';
            messageDiv.style.fontSize = '20px';
            document.body.appendChild(messageDiv);
        });
    }

    async function init() {
        const video = document.getElementById("video");
        const ui = video.ui;
        const controls = ui.getControls();
        const player = controls.getPlayer();

        player.configure({
            drm: {
                clearKeys: {
                    '2c60f5b5e6e8ad2d163532250859723b': "cb11a5f25b5baded086a2e7a046b9b02"
                }
            }
        });

        ui.configure({
            controlPanelElements: ["play_pause", "mute", "volume", "spacer", "time_and_duration", "quality", "fullscreen", "overflow_menu"],
            volumeBarColors: {
                base: "rgba(0, 0, 255, 1)",
                level: "rgb(0, 255, 0)"
            },
            seekBarColors: {
                base: "rgb(255, 0, 0)",
                buffered: "rgb(255, 255, 0)",
                played: "rgba(0, 128, 128, 1)"
            }
        });
        window.player = player;
        window.ui = ui;

        player.addEventListener("error", onPlayerErrorEvent);
        controls.addEventListener("error", onUIErrorEvent);

        try {
            await player.load("https://otte.live.fly.ww.aiv-cdn.net/iad-nitro/live/clients/dash/enc/rk7p7dafl0/out/v1/ffc1c57edf814108953aa0992b3145ff/cenc.mpd");
            console.log("The video has now been loaded!");
        } catch (error) {
            onPlayerError(error);
        }
    }

    function onPlayerErrorEvent(event) {
        onPlayerError(event.detail);
    }

    function onPlayerError(error) {
        console.error("Error code", error.code, "object", error);
    }

    function onUIErrorEvent(event) {
        onPlayerError(event.detail);
    }

    function initFailed() {
        console.error("Unable to load the UI library!");
    }

    document.addEventListener("shaka-ui-loaded", init);
    document.addEventListener("shaka-ui-load-failed", initFailed);
    </script>
</body>
</html>
