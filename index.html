<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Prime By Cricket Yoddha</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
  <style>
    body { background: #000; margin: 0; padding: 0; overflow: hidden; }
    .shaka-video-container { position: absolute; inset: 0; }
    video { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="shaka-video-container" data-shaka-player>
    <video autoplay muted playsinline></video>
  </div>

  <script>
    async function initPlayer() {
      const video = document.querySelector('video');
      const player = new shaka.Player(video);

      // CORS bypass and headers configuration
      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.allowCrossSiteCredentials = true;
        request.headers['Origin'] = 'https://www.amazon.com'; // Spoofing origin for some CDNs
      });

      player.configure({
        drm: {
          clearKeys: {
            "632b06f50e561ccfc3473ae057177d70": "1fd0877cfa85e2617ab00f14b4fb66fe"
          }
        },
        streaming: { lowLatencyMode: true }
      });

      try {
        await player.load("https://otte.live.fly.ww.aiv-cdn.net/iad-nitro/live/clients/dash/enc/tcgcz1g3fk/out/v1/33a4bce588914c258fd9300022b50846/cenc.mpd");
        console.log("Stream loaded successfully!");
      } catch (e) {
        console.error("Error code: " + e.code);
      }
    }

    document.addEventListener('DOMContentLoaded', initPlayer);
  </script>
</body>
</html>
