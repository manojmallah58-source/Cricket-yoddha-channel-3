<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sony Sports Ten 3 Hindi HD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .shaka-video-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: contain;
        }
        .shaka-spinner-container,
        .shaka-spinner,
        .shaka-spinner-svg {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }
        /* Custom Screenshot Button Styling */
        .material-icon-screenshot {
            font-family: 'Material Icons', sans-serif;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .material-icon-screenshot:hover {
            color: #ddd;
        }
    </style>
</head>
<body>
    <div class="shaka-video-container" data-shaka-player>
        <video autoplay playsinline preload="metadata" poster=""></video>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                console.error('Browser not supported');
                return;
            }

            const video = document.querySelector('video');
            const player = new shaka.Player();
            await player.attach(video);

            const container = document.querySelector('.shaka-video-container');
            
            // Create Custom Screenshot UI Element for Shaka Player
            class ScreenshotButton extends shaka.ui.Element {
                constructor(parent, controls) {
                    super(parent, controls);
                    this.button_ = document.createElement('button');
                    this.button_.className = 'material-icon-screenshot shaka-tooltip';
                    this.button_.setAttribute('aria-label', 'Take Screenshot');
                    this.button_.innerHTML = '📷';
                    parent.appendChild(this.button_);

                    this.eventManager.listen(this.button_, 'click', () => {
                        this.takeScreenshot();
                    });
                }

                takeScreenshot() {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 1280;
                    canvas.height = video.videoHeight || 720;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const dataURL = canvas.toDataURL('image/png');
                    const a = document.createElement('a');
                    a.href = dataURL;
                    a.download = 'screenshot_' + new Date().toISOString().slice(0,19).replace(/:/g, '-') + '.png';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            }

            ScreenshotButton.Factory = class {
                create(rootElement, controls) {
                    return new ScreenshotButton(rootElement, controls);
                }
            };

            shaka.ui.Controls.registerButton('screenshot', ScreenshotButton.Factory);

            const ui = new shaka.ui.Overlay(player, container, video);

            ui.configure({
                controlPanelElements: [
                    'play_pause', 'time_and_duration', 'mute', 'volume',
                    'spacer', 'language', 'captions', 'picture_in_picture',
                    'quality', 'screenshot', 'fullscreen'
                ],
                volumeBarColors: { base: 'purple', level: 'purple' },
                seekBarColors: { base: 'white', buffered: 'red', played: 'blue' }
            });

            // Stream URL and DRM Configuration
            let streamUrl = "https://jiotvpllive.cdn.jio.com/bpk-tv/SonySportsTen3HinHDSTB_BTS/WDVLive/index.mpd?__hdnea__=st=1784867425~exp=1784889025~acl=/bpk-tv/SonySportsTen3HinHDSTB_BTS/WDVLive/*~hmac=6c5da9d89cc6a9559d708bc4c4bf4234bff9c8fdae0ab239bc0fb801c06b4399";
            
            let drmConfig = {
                clearKeys: {
                    "08638117638b55649c6befa7f5cb34f6": "58ddb6bbdf8d8b1e2aac2b5312e99086"
                }
            };
            
            let cookieHeader = "__hdnea__=st=1784867425~exp=1784889025~acl=/bpk-tv/SonySportsTen3HinHDSTB_BTS/WDVLive/*~hmac=6c5da9d89cc6a9559d708bc4c4bf4234bff9c8fdae0ab239bc0fb801c06b4399";

            player.configure({
                drm: drmConfig,
                streaming: {
                    lowLatencyMode: true,
                    bufferingGoal: 15,
                    rebufferingGoal: 2,
                    bufferBehind: 15,
                    retryParameters: {
                        timeout: 10000,
                        maxAttempts: 5,
                        baseDelay: 300,
                        backoffFactor: 1.2
                    }
                }
            });

            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
                request.headers['Cookie'] = cookieHeader;

                if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                     type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && 
                    request.uris[0] && !request.uris[0].includes('__hdnea=')) {
                    const separator = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += separator + cookieHeader;
                }
            });

            const attemptAutoplay = async () => {
                try {
                    video.muted = false;
                    await video.play();
                } catch (error) {
                    video.muted = true;
                    await video.play();
                }
            };

            player.addEventListener('error', (event) => console.error('Shaka Player Error:', event.detail));

            try {
                await player.load(streamUrl);
                if (video.readyState >= 3) {
                    await attemptAutoplay();
                } else {
                    video.addEventListener('canplay', attemptAutoplay, { once: true });
                }
            } catch (error) {
                console.error('Load error:', error);
            }

            ['click', 'touchstart'].forEach(event => {
                document.addEventListener(event, () => { if(video.muted) video.muted = false; }, { once: true });
            });
        });
    </script>
</body>
</html>
